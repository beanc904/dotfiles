# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
# Use the alternate form for schema definition instead of using "$schema"="URL" due to stricter
# config parsing added in Yazi 26.5.6. Read more: https://github.com/sxyazi/yazi/issues/3938#issuecomment-4389721843
#:schema https://yazi-rs.github.io/schemas/theme.json

# vscode-dark-plus (Dark+)
# https://github.com/956MB/vscode.yazi/blob/main/themes/vscode-dark-plus/
#
# A theme inspired by Visual Studio Code's Dark+ Visual Studio theme.

[colors]
background = "#1E1E1E"
foreground = "#D4D4D4"
selection = "#3A3D41"
cursor = "#D4D4D4"
black = "#000000"
red = "#CD3131"
green = "#0DBC79"
yellow = "#E5E510"
blue = "#2472C8"
magenta = "#BC3FBC"
cyan = "#11A8CD"
white = "#E5E5E5"
bright_black = "#666666"
bright_red = "#F14C4C"
bright_green = "#23D18B"
bright_yellow = "#F5F543"
bright_blue = "#3B8EEA"
bright_magenta = "#D670D6"
bright_cyan = "#29B8DB"
bright_white = "#E5E5E5"

[mgr]
cwd = { fg = "cyan" }

# Find
find_keyword = { fg = "#569CD6", bold = true, italic = true, underline = true }
find_position = { fg = "#D4D4D4", bg = "#3A3D41", bold = true }

# Marker
marker_copied = { fg = "#73C991", bg = "#73C991" }
marker_cut = { fg = "#F14C4C", bg = "#F14C4C" }
marker_marked = { fg = "#569CD6", bg = "#569CD6" }
marker_selected = { fg = "#264F78", bg = "#264F78" }

# Count
count_copied = { fg = "#1E1E1E", bg = "#73C991" }
count_cut = { fg = "#1E1E1E", bg = "#F14C4C" }
count_selected = { fg = "#1E1E1E", bg = "#264F78" }

# Border
border_symbol = "│"
border_style = { fg = "#404040" }


[tabs]
active = { fg = "#D4D4D4", bg = "#1E1E1E" }
inactive = { fg = "#D4D4D4", bg = "#2D2D2D" }


[mode]
normal_main = { fg = "#1E1E1E", bg = "#569CD6", bold = true }
normal_alt = { fg = "#569CD6", bg = "#2D2D2D" }

select_main = { fg = "#1E1E1E", bg = "#FFAF00", bold = true }
select_alt = { fg = "#FFAF00", bg = "#2D2D2D" }

unset_main = { fg = "#1E1E1E", bg = "#F44747", bold = true }
unset_alt = { fg = "#F44747", bg = "#2D2D2D" }


[status]
# Permissions
perm_sep = { fg = "#404040" }
perm_type = { fg = "#6A9955" }
perm_read = { fg = "#CE9178" }
perm_write = { fg = "#F44747" }
perm_exec = { fg = "#569CD6" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#569CD6", bg = "#1E1E1E" }
progress_error = { fg = "#F44747", bg = "#1E1E1E" }


[pick]
border = { fg = "#569CD6" }
active = { fg = "#CE9178", bold = true }
inactive = {}


[input]
border = { fg = "#569CD6" }
title = {}
value = {}
selected = { reversed = true }


[cmp]
border = { fg = "#569CD6" }


[tasks]
border = { fg = "#569CD6" }
title = {}
hovered = { underline = true }


[which]
mask = { bg = "#1E1E1E" }
cand = { fg = "#569CD6" }
rest = { fg = "#808080" }
desc = { fg = "#CE9178" }
separator = "  "
separator_style = { fg = "#808080" }


[help]
on = { fg = "#569CD6" }
run = { fg = "#CE9178" }
hovered = { bg = "#3A3D41", bold = true }
footer = { fg = "#D4D4D4", bg = "#252526" }


[spot]
border = { fg = "#569CD6" }
title = { fg = "#569CD6" }
tbl_col = { fg = "#11A8CD" }
tbl_cell = { fg = "#CE9178", bg = "#2D2D2D" }


[notify]
title_info = { fg = "#0DBC79" }
title_warn = { fg = "#E5E510" }
title_error = { fg = "#F44747" }


[filetype]
rules = [
    # Images
    { mime = "image/*", fg = "#CE9178" },
    # Media
    { mime = "{audio,video}/*", fg = "#CE9178" },
    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#F44747" },
    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#569CD6" },
    { mime = "application/vnd.openxmlformats-officedocument.*", fg = "#569CD6" },
    # Virtual file system
    { mime = "vfs/{absent,stale}", fg = "#808080" },
    # Fallback
    { url = "*", fg = "#D4D4D4" },
    { url = "*/", fg = "#2472C8" },
]


[icon]
dirs = [
    { name = "Desktop", text = "" },
    { name = "Documents", text = "" },
    { name = "Downloads", text = "" },
    { name = "Pictures", text = "" },
    { name = "Music", text = "" },
    { name = "Videos", text = "" },
    { name = ".git", text = "" },
    { name = ".config", text = "" },
]
conds = [
    # Special files
    { if = "orphan", text = "", fg = "#D4D4D4" },
    { if = "link", text = "", fg = "#0DBC79" },
    { if = "block", text = "", fg = "#E5E510" },
    { if = "char", text = "", fg = "#E5E510" },
    { if = "fifo", text = "", fg = "#E5E510" },
    { if = "sock", text = "", fg = "#E5E510" },
    { if = "dummy", text = "", fg = "#CD3131" },

    # Fallback
    { if = "dir & hovered", text = "", fg = "#2472C8" },
    { if = "dir", text = "", fg = "#2472C8" },
    { if = "exec", text = "", fg = "#0DBC79" },
    { if = "!dir", text = "", fg = "#D4D4D4" },
]
